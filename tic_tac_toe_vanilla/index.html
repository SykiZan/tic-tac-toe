<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="screen">
      <div class="game-window">
        <div class="info">
          <h2 class="score">Score</h2>
          <div>
            <h2 class="score">Player_X:</h2>
            <h2 class="player--x--score">0</h2>
          </div>
          <div>
            <h2 class="score">Player_O:</h2>
            <h2 class="player--o--score">0</h2>
          </div>
        </div>
        <div class="board--wrap">
          <div class="board">
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
            <div class="cell"></div>
          </div>
        </div>
        <button class="btn clear">Clear board</button>
        <button class="btn reset">Reset</button>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
